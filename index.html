<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0B0E13" />
<title>Malden Line — live departures</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0B0E13;
    --ink-2:#10151D;
    --surface:#151B24;
    --surface-2:#1A222D;
    --line:#222B36;
    --amber:#FFC24B;
    --amber-dim:#C9962F;
    --text:#E7ECF2;
    --muted:#8190A0;
    --muted-2:#5C6877;
    --green:#56D6A0;
    --red:#FF7A6B;
    --shadow:0 20px 50px -24px rgba(0,0,0,.8);
    --display:'Space Grotesk',system-ui,sans-serif;
    --body:'Inter',system-ui,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(255,194,75,.06), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(86,214,160,.05), transparent 55%),
      var(--ink);
    color:var(--text);
    font-family:var(--body);
    -webkit-font-smoothing:antialiased;
    line-height:1.45;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .wrap{max-width:560px;margin:0 auto;padding:18px 16px 40px;}

  /* ---- Top bar ---- */
  .top{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
  .tile{
    width:42px;height:42px;border-radius:11px;flex:none;
    background:linear-gradient(160deg,var(--amber),#e0a52f);
    color:#1a1205;font-family:var(--display);font-weight:700;font-size:15px;
    display:grid;place-items:center;letter-spacing:.5px;
    box-shadow:0 6px 18px -6px rgba(255,194,75,.5);
  }
  .brand h1{font-family:var(--display);font-size:17px;font-weight:600;letter-spacing:-.2px;line-height:1.1;}
  .brand p{font-size:11.5px;color:var(--muted);letter-spacing:.3px;}
  .clock{margin-left:auto;text-align:right;}
  .clock .t{font-family:var(--mono);font-size:18px;font-weight:500;font-variant-numeric:tabular-nums;letter-spacing:1px;}
  .clock .d{font-size:10.5px;color:var(--muted);letter-spacing:.4px;text-transform:uppercase;}
  .refresh-btn{
    flex:none;width:42px;height:42px;border-radius:12px;position:relative;
    border:1px solid var(--line);background:var(--ink-2);color:var(--muted);
    display:grid;place-items:center;cursor:pointer;
    transition:color .2s,border-color .2s,background .2s,transform .12s;
  }
  .refresh-ago{
    position:absolute;top:calc(100% + 3px);left:50%;transform:translateX(-50%);
    font-family:var(--mono);font-size:9px;line-height:1;color:var(--muted-2);
    white-space:nowrap;pointer-events:none;letter-spacing:.3px;
  }
  .refresh-btn:hover{color:var(--text);border-color:var(--muted-2)}
  .refresh-btn:active{transform:scale(.9)}
  .refresh-btn:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
  .refresh-btn.spin{color:var(--amber);border-color:rgba(255,194,75,.4)}
  .refresh-btn.spin .ic-refresh{animation:rot .8s linear infinite;transform-origin:center}
  @keyframes rot{to{transform:rotate(360deg)}}

  /* ---- Direction toggle ---- */
  .toggle{
    display:grid;grid-template-columns:1fr 1fr;gap:4px;
    background:var(--ink-2);border:1px solid var(--line);border-radius:14px;
    padding:4px;margin-bottom:14px;position:relative;
  }
  .toggle button{
    appearance:none;border:0;background:transparent;cursor:pointer;
    font-family:var(--display);font-weight:600;font-size:14px;color:var(--muted);
    padding:11px 8px;border-radius:10px;transition:color .25s, background .25s, transform .15s;
    display:flex;align-items:center;justify-content:center;gap:7px;
  }
  .toggle button .ic{font-size:13px;opacity:.9}
  .toggle button[aria-pressed="true"]{
    background:var(--surface-2);color:var(--text);
    box-shadow:inset 0 0 0 1px var(--line);
  }
  .toggle button:active{transform:scale(.985)}

  /* ---- Alert banner ---- */
  .alert{
    display:none;align-items:center;gap:10px;
    border-radius:12px;padding:11px 13px;margin-bottom:14px;font-size:13px;
    border:1px solid;
  }
  .alert.show{display:flex}
  .alert.warn{background:rgba(255,194,75,.08);border-color:rgba(255,194,75,.28);color:#f5cf86;}
  .alert.bad{background:rgba(255,122,107,.08);border-color:rgba(255,122,107,.30);color:#ffa99c;}
  .alert .dot{width:8px;height:8px;border-radius:50%;flex:none;background:currentColor;animation:pulse 1.8s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

  /* ---- Hero next train ---- */
  .hero{
    background:linear-gradient(180deg,var(--surface),var(--ink-2));
    border:1px solid var(--line);border-radius:20px;padding:20px;margin-bottom:14px;
    box-shadow:var(--shadow);position:relative;overflow:hidden;
  }
  .hero::before{content:"";position:absolute;inset:0;background:
    repeating-linear-gradient(90deg,rgba(255,255,255,.015) 0 2px,transparent 2px 5px);
    pointer-events:none;opacity:.5;}
  .hero .eyebrow{font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
  .live{display:inline-flex;align-items:center;gap:6px;color:var(--green);font-weight:500}
  .live.demo{color:var(--amber)}
  .live i{width:7px;height:7px;border-radius:50%;background:currentColor;animation:pulse 1.6s infinite;font-style:normal}
  .hero .dest{font-family:var(--display);font-size:26px;font-weight:600;letter-spacing:-.4px;line-height:1.1;margin-bottom:2px;}
  .hero .via{font-size:12.5px;color:var(--muted);margin-bottom:16px;}
  .hero .row{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;}
  .hero .timeblock .lbl{font-size:10.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted-2);margin-bottom:3px;}
  .hero .sched{font-family:var(--mono);font-size:40px;font-weight:500;font-variant-numeric:tabular-nums;line-height:.95;color:var(--amber);letter-spacing:1px;}
  .hero .status{font-family:var(--mono);font-size:13px;margin-top:7px;font-variant-numeric:tabular-nums;}
  .hero .count{text-align:right;flex:none;}
  .hero .count .n{font-family:var(--display);font-size:34px;font-weight:700;line-height:1;letter-spacing:-1px;}
  .hero .count .u{font-size:11.5px;color:var(--muted);letter-spacing:.4px;text-transform:uppercase;}
  .plat{display:inline-flex;align-items:center;gap:6px;margin-top:14px;font-size:12px;color:var(--muted);}
  .plat b{font-family:var(--mono);color:var(--text);background:var(--surface-2);border:1px solid var(--line);border-radius:7px;padding:2px 8px;font-weight:500;}

  .ontime{color:var(--green)} .late{color:var(--amber)} .cancel{color:var(--red)}

  /* ---- Journey progress (collapsible) ---- */
  .progress-toggle{
    appearance:none;background:transparent;border:0;cursor:pointer;
    width:100%;display:flex;align-items:center;justify-content:center;
    color:var(--muted-2);margin-top:12px;padding:9px 0 2px;
    border-top:1px solid var(--line);transition:color .2s;
  }
  .progress-toggle:hover{color:var(--amber)}
  .progress-toggle:focus-visible{outline:2px solid var(--amber);outline-offset:3px;border-radius:6px}
  .progress-toggle .chev{transition:transform .25s ease,color .2s;}
  .progress-toggle[aria-expanded="true"] .chev{transform:rotate(180deg);color:var(--amber)}
  .progress{display:none;margin-top:6px;padding-top:12px;}
  .progress.open{display:block;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:none}}
  .prog-cap{font-size:12px;color:var(--amber);margin-bottom:10px;font-weight:500;}
  .demo-chip{font-size:9.5px;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);border:1px solid var(--line);border-radius:5px;padding:1px 5px;}
  .htl{overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;padding-bottom:6px;scrollbar-width:thin;scrollbar-color:var(--line) transparent;}
  .htl::-webkit-scrollbar{height:5px}
  .htl::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
  .htl-track{position:relative;padding-top:8px;}
  .htl-line{position:absolute;top:32px;height:2px;background:var(--line);border-radius:2px;z-index:0;}
  .htl-fill{position:absolute;top:32px;height:2px;background:linear-gradient(90deg,var(--amber-dim),var(--amber));border-radius:2px;z-index:1;box-shadow:0 0 8px rgba(255,194,75,.45);transition:width .9s linear;}
  .htl-head{position:absolute;top:33px;width:13px;height:13px;border-radius:50%;background:var(--amber);transform:translate(-50%,-50%);box-shadow:0 0 0 4px rgba(255,194,75,.2),0 0 10px rgba(255,194,75,.65);z-index:3;animation:pulse 1.4s infinite;transition:left .9s linear;}
  .htl-cols{display:flex;position:relative;z-index:2;}
  .htl-col{flex:0 0 auto;width:70px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:7px;}
  .htl-time{font-family:var(--mono);font-size:10px;color:var(--muted);font-variant-numeric:tabular-nums;height:12px;line-height:12px;}
  .htl-dot{width:11px;height:11px;border-radius:50%;border:2px solid var(--muted-2);background:var(--ink);box-sizing:border-box;}
  .htl-name{font-size:10.5px;line-height:1.18;color:var(--muted);max-width:66px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .htl-plat{display:block;font-family:var(--mono);font-size:9px;color:var(--muted-2);margin-top:2px;}
  .htl-col.done .htl-dot{background:var(--amber-dim);border-color:var(--amber-dim);}
  .htl-col.done .htl-name,.htl-col.done .htl-time{color:var(--muted-2);}
  .htl-col.now .htl-dot{background:var(--amber);border-color:var(--amber);}
  .htl-col.now .htl-name{color:var(--text);font-weight:600;}
  .htl-col.now .htl-time{color:var(--amber);}
  .htl-col.cx .htl-dot{border-color:var(--red);background:var(--ink);}
  .htl-col.cx .htl-name{color:var(--red);text-decoration:line-through;}

  /* ---- Station picker ---- */
  .station-row{display:flex;align-items:center;gap:10px;margin:-4px 2px 14px;}
  .station-lbl{font-size:12px;color:var(--muted);min-width:34px;}
  .station-wrap{position:relative;flex:1;}
  #station{
    appearance:none;-webkit-appearance:none;width:100%;cursor:pointer;
    background:var(--ink-2);color:var(--text);border:1px solid var(--line);
    border-radius:11px;padding:10px 38px 10px 13px;
    font-family:var(--display);font-size:14px;font-weight:600;
    transition:border-color .2s;
  }
  #station:hover{border-color:var(--muted-2)}
  #station:focus-visible{outline:2px solid var(--amber);outline-offset:1px}
  .station-chev{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}

  /* ---- List ---- */
  .listhead{display:flex;align-items:center;justify-content:space-between;margin:18px 4px 8px;}
  .listhead h2{font-size:11.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);font-weight:600;}
  .listhead .src{font-size:11px;color:var(--muted-2);font-family:var(--mono);}
  .board{display:flex;flex-direction:column;gap:7px;}
  .svc{
    display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:13px;
    background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:13px 15px;
    transition:border-color .2s, transform .12s;
  }
  .svc:active{transform:scale(.995)}
  .svc.gone{opacity:.4}
  .svc .stime{font-family:var(--mono);font-size:19px;font-weight:500;font-variant-numeric:tabular-nums;color:var(--amber);letter-spacing:.5px;}
  .svc.cx .stime{color:var(--red);text-decoration:line-through;text-decoration-thickness:1.5px;}
  .svc .mid .d{font-size:14.5px;font-weight:500;line-height:1.2;}
  .svc .mid .s{font-family:var(--mono);font-size:11.5px;margin-top:2px;font-variant-numeric:tabular-nums;}
  .svc .mid .tag{font-size:10px;color:var(--muted-2);margin-top:1px;letter-spacing:.3px;}
  .svc .right{text-align:right;}
  .svc .right .cd{font-family:var(--display);font-size:15px;font-weight:600;font-variant-numeric:tabular-nums;line-height:1;}
  .svc .right .pl{font-size:10.5px;color:var(--muted);margin-top:4px;}
  .svc .right .pl b{color:var(--text);font-family:var(--mono);font-weight:500}

  /* ---- States ---- */
  .skeleton .svc{background:var(--surface);border-color:var(--line);height:62px;animation:sk 1.4s ease-in-out infinite}
  @keyframes sk{0%,100%{opacity:.5}50%{opacity:.85}}
  .empty{text-align:center;color:var(--muted);padding:34px 16px;border:1px dashed var(--line);border-radius:14px;font-size:13.5px;}

  /* ---- Footer ---- */
  .foot{margin-top:20px;display:flex;align-items:center;gap:10px;font-size:11px;color:var(--muted-2);}

  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
  @media (max-width:380px){
    .hero .sched{font-size:34px}.hero .dest{font-size:22px}.hero .count .n{font-size:28px}
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <div class="tile">NEM</div>
    <div class="brand">
      <h1>Malden Line</h1>
      <p>Live departures · New Malden</p>
    </div>
    <div class="clock">
      <div class="t" id="clock">--:--</div>
      <div class="d" id="date">—</div>
    </div>
    <button class="refresh-btn" id="refresh" onclick="refresh(true)" aria-label="Refresh train times" title="Refresh times">
      <svg class="ic-refresh" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="23 4 23 10 17 10"></polyline>
        <polyline points="1 20 1 14 7 14"></polyline>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
      </svg>
      <span class="refresh-ago" id="refresh-ago"></span>
    </button>
  </header>

  <div class="toggle" role="tablist" aria-label="Direction">
    <button id="btn-out" role="tab" aria-pressed="true" onclick="setDir('out')"><span class="ic">↗</span>To London</button>
    <button id="btn-home" role="tab" aria-pressed="false" onclick="setDir('home')"><span class="ic">↘</span>Home</button>
  </div>

  <div class="station-row">
    <span id="station-label" class="station-lbl">To</span>
    <div class="station-wrap">
      <select id="station" aria-label="Choose station" onchange="setStation(this.value)"></select>
      <svg class="station-chev" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"></polyline></svg>
    </div>
  </div>

  <div class="alert" id="alert" role="status">
    <span class="dot"></span><span id="alert-txt"></span>
  </div>

  <section id="hero-slot" aria-live="polite"></section>

  <div class="listhead">
    <h2 id="list-title">Later departures</h2>
    <span class="src" id="src">—</span>
  </div>
  <div class="board" id="board" aria-live="polite"></div>

  <footer class="foot">
    <span id="updated">—</span>
  </footer>
</div>

<script>
"use strict";

/* ============================================================
   Config — New Malden is fixed; the London end is selectable.
   ============================================================ */
const STATIONS = {
  NEM:"New Malden", WAT:"London Waterloo", VXH:"Vauxhall",
  CLJ:"Clapham Junction", EAD:"Earlsfield", WIM:"Wimbledon",
};
// The selectable London-end stations (Waterloo is the default).
const LONDON_STATIONS = [
  { code:"WAT", name:"Waterloo" },
  { code:"VXH", name:"Vauxhall" },
  { code:"CLJ", name:"Clapham Junction" },
  { code:"EAD", name:"Earlsfield" },
  { code:"WIM", name:"Wimbledon" },
];

let state = {
  dir: defaultDir(),
  station: "WAT",       // London-end station, always resets to Waterloo
  source: "demo",       // "live" | "demo"
  services: [],
  updated: null,
  loading: false,
};

/* The current journey, derived from direction + chosen station.
   To London: New Malden -> chosen station. Home: chosen station -> New Malden. */
function curJourney(){
  const st = state.station;
  return state.dir === "out"
    ? { from:"NEM", to:st, listTitle:"Later to London" }
    : { from:st, to:"NEM", listTitle:"Later trains home" };
}

/* Pick a sensible default: mornings face London, afternoons head home. */
function defaultDir(){
  const h = new Date().getHours();
  return (h >= 3 && h < 13) ? "out" : "home";
}

/* ============================================================
   Data — try the live proxy, fall back to demo times.
   The Cloudflare Function lives at /api/board and keeps the
   Realtime Trains token server-side.
   ============================================================ */
async function fetchBoard(dir){
  const j = curJourney();
  try{
    const r = await fetch(`/api/board?from=${j.from}&to=${j.to}`, { headers:{accept:"application/json"} });
    if(!r.ok) throw new Error("proxy "+r.status);
    const data = await r.json();
    if(!data || !Array.isArray(data.services)) throw new Error("shape");
    return { source:"live", services:data.services };
  }catch(e){
    return { source:"demo", services:demoBoard(dir) };
  }
}

/* Realistic stand-in data so the app is fully alive before the
   live feed is wired up. Times are generated around 'now'. */
function demoBoard(dir){
  const now = new Date();
  const out = dir === "out";
  const dests = out
    ? [["London Waterloo",""],["London Waterloo","via Kingston"],["London Waterloo",""],["London Waterloo","via Kingston"],["London Waterloo",""]]
    : [["Woking","calls New Malden"],["Guildford","via Cobham · calls New Malden"],["Shepperton","calls New Malden"],["Hampton Court","calls New Malden"],["Dorking","calls New Malden"]];
  const list = [];
  let t = 4 + Math.floor(Math.random()*4); // first train in ~4–7 min
  for(let i=0;i<7;i++){
    const dep = new Date(now.getTime() + t*60000);
    const [d,via] = dests[i % dests.length];
    // sprinkle a delay and an occasional cancellation
    let status="ontime", etd=null;
    const roll = Math.random();
    if(i===1 && roll<0.6){ status="late"; etd=new Date(dep.getTime()+ (3+Math.floor(Math.random()*6))*60000); }
    else if(i===3 && roll<0.25){ status="cancel"; }
    else if(roll<0.12){ status="late"; etd=new Date(dep.getTime()+2*60000); }
    list.push({
      id:"demo"+i,
      std:hhmm(dep),
      etd: etd?hhmm(etd):null,
      depMs: dep.getTime(),
      status,
      platform: out ? String(1+(i%2)) : String(1+(i%4)),
      destination: d,
      via,
      operator:"South Western Railway",
    });
    t += 7 + Math.floor(Math.random()*9); // 7–15 min gaps
  }
  return list;
}

/* ============================================================
   Time helpers
   ============================================================ */
function hhmm(d){ return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); }

/* Turn an "HH:MM" (or live "HHMM") into a ms timestamp near now,
   rolling to tomorrow if it's well in the past (late-night trains). */
function toMs(t, fallbackMs){
  if(fallbackMs) return fallbackMs;
  if(!t) return null;
  const clean = t.replace(":","");
  const hh = +clean.slice(0,2), mm = +clean.slice(2,4);
  const now = new Date();
  const d = new Date(now.getFullYear(),now.getMonth(),now.getDate(),hh,mm,0,0);
  if(d.getTime() < now.getTime() - 3*3600000) d.setDate(d.getDate()+1);
  return d.getTime();
}
function fmtStd(t){ return t && t.includes(":") ? t : (t? t.slice(0,2)+":"+t.slice(2,4) : "--:--"); }
function minsUntil(ms){ return Math.round((ms - Date.now())/60000); }
function countLabel(ms){
  const m = minsUntil(ms);
  if(m <= 0) return "due";
  if(m === 1) return "1 min";
  if(m < 60) return m+" min";
  const h=Math.floor(m/60), r=m%60; return r?`${h}h ${r}m`:`${h}h`;
}

/* ============================================================
   Render
   ============================================================ */
function normalise(list){
  return list.map(s=>{
    const depMs = toMs(s.std, s.depMs);
    const etdMs = s.etd ? toMs(s.etd) : null;
    return {...s, depMs, etdMs, stdLabel:fmtStd(s.std), etdLabel:s.etd?fmtStd(s.etd):null};
  }).sort((a,b)=> (a.depMs||0)-(b.depMs||0));
}

function statusLine(s){
  if(s.status==="cancel") return `<span class="cancel">Cancelled</span>`;
  if(s.status==="late" && s.etdLabel) return `<span class="late">Expected ${s.etdLabel}</span>`;
  return `<span class="ontime">On time</span>`;
}

function render(){
  const j = curJourney();
  document.getElementById("list-title").textContent = j.listTitle;
  document.getElementById("btn-out").setAttribute("aria-pressed", state.dir==="out");
  document.getElementById("btn-home").setAttribute("aria-pressed", state.dir==="home");
  document.getElementById("src").textContent = state.source==="live" ? "live · RTT" : "demo data";
  syncStationPicker();

  const all = normalise(state.services);
  const upcoming = all.filter(s=> s.status==="cancel" || (s.depMs && s.depMs > Date.now()-90000));

  // --- alert banner (derived from the upcoming services) ---
  const al = document.getElementById("alert"), alt=document.getElementById("alert-txt");
  const cx = upcoming.filter(s=>s.status==="cancel").length;
  const lateBad = upcoming.find(s=> s.status==="late" && s.etdMs && (s.etdMs-s.depMs)/60000 >= 5);
  al.className = "alert";
  if(cx>0){ al.classList.add("show","bad"); alt.textContent = `${cx} ${cx>1?"services":"service"} cancelled in the next hour — check before you travel.`; }
  else if(lateBad){ al.classList.add("show","warn"); alt.textContent = `Minor delays on the line right now.`; }

  // --- hero (the very next train) ---
  const heroSlot = document.getElementById("hero-slot");
  const next = upcoming.find(s=>s.status!=="cancel") || upcoming[0];
  if(!next){
    heroSlot.innerHTML = `<div class="empty">No departures in the next two hours.</div>`;
  } else {
    const liveCls = state.source==="live" ? "live" : "live demo";
    const liveTxt = state.source==="live" ? "Live" : "Demo";
    const pkey = keyFor(next);
    progressTargets[pkey] = next;
    const showProg = next.status !== "cancel";
    heroSlot.innerHTML = `
      <div class="hero">
        <div class="eyebrow">Next ${state.dir==="out"?"to London":"home"} · <span class="${liveCls}"><i></i>${liveTxt}</span></div>
        <div class="dest">${esc(next.destination)}</div>
        <div class="via">${esc(viaText(next))}</div>
        <div class="row">
          <div class="timeblock">
            <div class="lbl">Departs</div>
            <div class="sched">${next.stdLabel}</div>
            <div class="status">${statusLine(next)}</div>
          </div>
          <div class="count">
            <div class="n" id="hero-count">${next.status==="cancel"?"—":countLabel(next.etdMs||next.depMs)}</div>
            <div class="u">${next.status==="cancel"?"no service":"to go"}</div>
          </div>
        </div>
        <div class="plat">Platform <b>${next.platform||"?"}</b> · ${esc(next.operator||"South Western Railway")}</div>
        ${showProg ? `
        <button class="progress-toggle" id="tog-${pkey}" aria-expanded="false" aria-label="Show stops and live position" onclick="toggleProgress('${pkey}')">
          <svg class="chev" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </button>
        <div class="progress" id="prog-${pkey}"></div>` : ""}
      </div>`;
  }

  // --- later list (skip the hero train) ---
  const board = document.getElementById("board");
  const rest = upcoming.filter(s=> s!==next).slice(0,6);
  if(rest.length===0 && next){
    board.innerHTML = `<div class="empty">That's the only train showing right now.</div>`;
  } else {
    board.innerHTML = rest.map(s=>{
      const cls = s.status==="cancel" ? "svc cx" : "svc";
      const cd = s.status==="cancel" ? `<span class="cancel">—</span>` : `<span>${countLabel(s.etdMs||s.depMs)}</span>`;
      return `<div class="${cls}">
        <div class="stime">${s.stdLabel}</div>
        <div class="mid">
          <div class="d">${esc(s.destination)}</div>
          <div class="s">${statusLine(s)}</div>
          ${viaText(s)?`<div class="tag">${esc(viaText(s))}</div>`:""}
        </div>
        <div class="right">
          <div class="cd">${cd}</div>
          <div class="pl">Plat <b>${s.platform||"?"}</b></div>
        </div>
      </div>`;
    }).join("");
  }

  const u = document.getElementById("updated");
  u.textContent = state.updated ? `Updated ${hhmm(state.updated)} · refresh for the latest` : "—";
}

function esc(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

/* ============================================================
   Journey progress — full stop list + where the train is now.
   Fetched lazily (one API call) only when the user taps to open.
   ============================================================ */
let progressTargets = {}; // key -> service object (rebuilt each render)

function keyFor(s){ return "s" + String(s.id || (s.std + s.destination)).replace(/[^a-z0-9]/gi,""); }

async function toggleProgress(key){
  const panel = document.getElementById("prog-" + key);
  const tog = document.getElementById("tog-" + key);
  if(!panel) return;
  const open = panel.classList.toggle("open");
  if(tog) tog.setAttribute("aria-expanded", open ? "true" : "false");
  if(open && panel.dataset.loaded !== "1"){
    panel.innerHTML = `<div class="prog-cap">Finding the train…</div>`;
    const data = await loadService(progressTargets[key]);
    renderProgress(panel, data);
    panel.dataset.loaded = "1";
  }
}

async function loadService(s){
  if(!s) return { stops:[], caption:"No information." };
  if(state.source === "live" && s.id){
    try{
      const r = await fetch(`/api/service?id=${encodeURIComponent(s.id)}`, { headers:{accept:"application/json"} });
      if(r.ok){
        const d = await r.json();
        if(d && Array.isArray(d.stops) && d.stops.length) return d;
      }
    }catch(e){ /* fall through to demo */ }
  }
  return demoService(s);
}

let openProgress = null; // tracks an open timeline so it can creep between refreshes

/* Estimate where the train is as a fractional stop index (e.g. 3.4 = 40%
   of the way from stop 3 to stop 4), using when it actually left the last
   station vs when it's due at the next. Recomputed live each second. */
function computePosition(stops){
  const n = stops.length;
  if(!n) return { pos:0, caption:"No information." };
  const depMs = stops.map(s=> s.dep ? toMs(s.dep) : null);
  const arrMs = stops.map(s=> s.arr ? toMs(s.arr) : (s.dep ? toMs(s.dep) : null));
  let lastDep = -1;
  stops.forEach((s,i)=>{ if(s.departed) lastDep = i; });
  const liveIdx = stops.findIndex(s=> s.status);

  let pos, caption;
  if(lastDep === -1){
    pos = 0;
    caption = `Not yet departed ${stops[0].name}`;
  } else if(lastDep >= n-1){
    pos = n-1;
    caption = `Arrived at ${stops[n-1].name}`;
  } else {
    const B = lastDep + 1;
    if(stops[B].arrived){
      pos = B;
      caption = `At ${stops[B].name}`;
    } else {
      const a = depMs[lastDep], b = arrMs[B];
      let frac = 0.12;
      if(a!=null && b!=null && b>a) frac = Math.max(0.04, Math.min(0.96, (Date.now()-a)/(b-a)));
      pos = lastDep + frac;
      caption = `Left ${stops[lastDep].name} · approaching ${stops[B].name}`;
    }
  }
  // a live "approaching / at platform" report is more precise than the estimate
  if(liveIdx >= 0 && stops[liveIdx].status){
    caption = (stops[liveIdx].status === "APPROACHING" ? "Approaching " : "At ") + stops[liveIdx].name;
  }
  return { pos, caption };
}

function progressCols(stops, pos){
  return stops.map((st,i)=>{
    const done = pos > i + 0.08;
    const atHere = Math.abs(pos - i) <= 0.12;
    return `<div class="htl-col ${done?"done":""} ${atHere?"now":""} ${st.cancelled?"cx":""}">
      <div class="htl-time">${st.time||""}</div>
      <div class="htl-dot"></div>
      <div class="htl-name">${esc(st.name)}${st.platform?`<span class="htl-plat">P${esc(st.platform)}</span>`:""}</div>
    </div>`;
  }).join("");
}

function renderProgress(panel, data){
  if(!data.stops || !data.stops.length){
    panel.innerHTML = `<div class="prog-cap">No live stop information for this train.</div>`;
    openProgress = null;
    return;
  }
  const stops = data.stops, n = stops.length, W = 70;
  const { pos, caption } = computePosition(stops);
  const lineW = (n-1)*W, fillW = pos*W, headX = pos*W + W/2;

  panel.innerHTML = `
    <div class="prog-cap" data-cap>${data.demo?`<span class="demo-chip">demo</span> `:""}${esc(caption||"")}</div>
    <div class="htl">
      <div class="htl-track" style="width:${n*W}px">
        <div class="htl-line" style="left:${W/2}px;width:${lineW}px"></div>
        <div class="htl-fill" data-fill style="left:${W/2}px;width:${fillW}px"></div>
        <div class="htl-head" data-head style="left:${headX}px"></div>
        <div class="htl-cols">${progressCols(stops, pos)}</div>
      </div>
    </div>`;

  requestAnimationFrame(()=>{
    const outer = panel.querySelector(".htl");
    if(outer) outer.scrollLeft = Math.max(0, headX - outer.clientWidth/2);
  });

  openProgress = { panel, stops, n, W, demo:!!data.demo };
}

/* Called every second from tick() — nudges the marker along between stops
   without any new API calls. */
function updateOpenProgress(){
  const op = openProgress;
  if(!op) return;
  if(!document.body.contains(op.panel) || !op.panel.classList.contains("open")){ openProgress = null; return; }
  const { pos, caption } = computePosition(op.stops);
  const fill = op.panel.querySelector("[data-fill]");
  const head = op.panel.querySelector("[data-head]");
  const cap  = op.panel.querySelector("[data-cap]");
  if(fill) fill.style.width = (pos*op.W) + "px";
  if(head) head.style.left = (pos*op.W + op.W/2) + "px";
  if(cap)  cap.innerHTML = `${op.demo?`<span class="demo-chip">demo</span> `:""}${esc(caption||"")}`;
  op.panel.querySelectorAll(".htl-col").forEach((c,i)=>{
    c.classList.toggle("done", pos > i + 0.08);
    c.classList.toggle("now", Math.abs(pos - i) <= 0.12);
  });
}

/* Believable stand-in journey (with a live, moving position) for demo mode. */
const DEMO_LINE = ["Woking","Surbiton","New Malden","Raynes Park","Wimbledon","Earlsfield","Clapham Junction","Vauxhall","London Waterloo"];
function demoService(s){
  const out = state.dir === "out";
  const selName = STATIONS[state.station] || "London Waterloo";
  let selIdx = DEMO_LINE.indexOf(selName); if(selIdx < 0) selIdx = DEMO_LINE.length-1;
  let chain = DEMO_LINE.slice(0, selIdx+1);     // Woking … chosen station
  let board;
  if(out){ board = "New Malden"; } else { chain = chain.slice().reverse(); board = selName; }
  const boardIdx = Math.max(0, chain.indexOf(board));
  const base = parseHHMM(s && s.std);
  const now = Date.now();
  const stops = chain.map((nm,i)=>{
    const t = toHHMM(base + (i-boardIdx)*4);
    const tMs = toMs(t);
    return { name:nm, time:t, dep:t, arr:t, platform:(i%4)+1, departed: tMs < now, arrived: tMs < now - 30000 };
  });
  return { origin:chain[0], destination:chain[chain.length-1], stops, demo:true };
}

function parseHHMM(s){ if(!s) return 480; const p=s.split(":"); return (+p[0])*60 + (+p[1]); }
function toHHMM(mins){ mins=((Math.round(mins)%1440)+1440)%1440; return String(Math.floor(mins/60)).padStart(2,"0")+":"+String(mins%60).padStart(2,"0"); }


/* ============================================================
   Loading + lifecycle
   ============================================================ */
async function refresh(manual){
  if(state.loading) return;
  state.loading = true;
  const btn = document.getElementById("refresh");
  if(manual) btn.classList.add("spin");
  if(state.services.length===0) showSkeleton();
  const res = await fetchBoard(state.dir);
  state.source = res.source;
  state.services = res.services;
  state.updated = new Date();
  state.loading = false;
  btn.classList.remove("spin");
  render();
}

function showSkeleton(){
  document.getElementById("hero-slot").innerHTML =
    `<div class="hero" style="height:188px"></div>`;
  const b=document.getElementById("board"); b.className="board skeleton";
  b.innerHTML = Array.from({length:4}).map(()=>`<div class="svc"></div>`).join("");
  setTimeout(()=>{document.getElementById("board").className="board";},1200);
}

function setDir(dir){
  if(state.dir===dir){ return; }
  state.dir = dir;
  state.station = "WAT";   // always revert to Waterloo when switching direction
  state.services = [];
  render();
  refresh(false);
}

function setStation(code){
  if(!STATIONS[code] || state.station===code) return;
  state.station = code;
  state.services = [];
  render();
  refresh(false);
}

/* Keep the station dropdown in step with state (label + selected value). */
function syncStationPicker(){
  const sel = document.getElementById("station");
  const lbl = document.getElementById("station-label");
  if(!sel) return;
  lbl.textContent = state.dir === "out" ? "To" : "From";
  if(sel.value !== state.station) sel.value = state.station;
}

/* The small "calls at …" context line, given the chosen station. */
function viaText(s){
  if(state.dir === "home") return s.via || "calls New Malden";
  // To London: only note the chosen station when it isn't the Waterloo default.
  return state.station === "WAT" ? "" : `Calls at ${STATIONS[state.station]}`;
}

/* live ticking: clock + countdowns every second */
function tick(){
  const now=new Date();
  document.getElementById("clock").textContent = hhmm(now);
  document.getElementById("date").textContent =
    now.toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"});
  // update hero countdown cheaply without full re-render
  const all = normalise(state.services).filter(s=> s.status==="cancel" || (s.depMs && s.depMs>Date.now()-90000));
  const next = all.find(s=>s.status!=="cancel")||all[0];
  const el = document.getElementById("hero-count");
  if(el && next && next.status!=="cancel") el.textContent = countLabel(next.etdMs||next.depMs);
  // time since the last successful refresh (e.g. "2m")
  const ago = document.getElementById("refresh-ago");
  if(ago) ago.textContent = state.updated ? agoLabel(state.updated) : "";
  // nudge an open journey timeline along (local only)
  updateOpenProgress();
}

/* "now" / "45s" / "2m" / "1h" since the given time */
function agoLabel(d){
  const s = Math.floor((Date.now() - d.getTime())/1000);
  if(s < 10) return "now";
  if(s < 60) return s + "s";
  const m = Math.floor(s/60);
  if(m < 60) return m + "m";
  return Math.floor(m/60) + "h";
}

/* ---- boot ---- */
function buildStationOptions(){
  const sel = document.getElementById("station");
  if(!sel) return;
  sel.innerHTML = LONDON_STATIONS.map(s=>`<option value="${s.code}">${s.name}</option>`).join("");
  sel.value = state.station;
}
buildStationOptions();
tick();
render();
refresh(false);            // fetch once when the page opens
setInterval(tick, 1000);   // local clock + countdown only — no API calls
</script>
</body>
</html>
